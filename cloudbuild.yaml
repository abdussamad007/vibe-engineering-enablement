steps:
  # 1. Build and push the Backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/maturity-survey-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maturity-survey-backend']

  # 2. Build and push the Frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/maturity-survey-frontend', './frontend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maturity-survey-frontend']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'maturity-survey-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/maturity-survey-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # 4. Deploy Frontend to Cloud Run
  # Note: The user will need to update the BACKEND_URL environment variable 
  # after the backend is deployed and its URL is known.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'maturity-survey-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/maturity-survey-frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'BACKEND_URL=https://maturity-survey-backend-xyz.a.run.app' # Placeholder
